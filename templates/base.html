<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NAIK{% endblock %}</title>
  <script>
    window.LANG  = {{ lang | tojson }};
    window.i18n  = {{ i18n_js | tojson }};
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
