<svg id="hero-batik-svg" class="hero-batik"
  xmlns="http://www.w3.org/2000/svg"
  width="100%" height="100%"
  aria-hidden="true">
  <defs>
    <pattern id="batik" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">

      <!-- Diamond lattice -->
      <line x1="40" y1="0"  x2="80" y2="40" stroke="#BF4646" stroke-width="0.4" opacity="0.5"/>
      <line x1="0"  y1="40" x2="40" y2="80" stroke="#BF4646" stroke-width="0.4" opacity="0.5"/>
      <line x1="40" y1="0"  x2="0"  y2="40" stroke="#BF4646" stroke-width="0.4" opacity="0.5"/>
      <line x1="80" y1="40" x2="40" y2="80" stroke="#BF4646" stroke-width="0.4" opacity="0.5"/>

      <!-- LARGE MEDALLION at (40,40) -->
      <g transform="translate(40,40)" stroke="#7EACB5" stroke-width="0.9" fill="none">
        <path d="M0,-12 C-6,-20 -6,-30 0,-34 C6,-30 6,-20 0,-12Z"/>
        <path d="M0,12  C6,20  6,30  0,34  C-6,30 -6,20 0,12Z"/>
        <path d="M-12,0 C-20,-6 -30,-6 -34,0 C-30,6 -20,6 -12,0Z"/>
        <path d="M12,0  C20,6  30,6  34,0  C30,-6 20,-6 12,0Z"/>
        <path d="M8,-8   C13,-16 18,-20 21,-21 C20,-18 16,-13 8,-8Z"/>
        <path d="M-8,-8  C-13,-16 -18,-20 -21,-21 C-20,-18 -16,-13 -8,-8Z"/>
        <path d="M8,8    C16,13 20,18 21,21 C18,20 13,16 8,8Z"/>
        <path d="M-8,8   C-16,13 -20,18 -21,21 C-18,20 -13,16 -8,8Z"/>
        <polygon points="0,-10 10,0 0,10 -10,0"/>
        <polygon points="0,-6 6,0 0,6 -6,0" stroke-width="0.7" fill="#7EACB5" fill-opacity="0.1"/>
        <circle r="2.2" fill="#7EACB5" stroke="none"/>
        <circle cx="0"  cy="-34" r="1.2" fill="#7EACB5" stroke="none"/>
        <circle cx="0"  cy="34"  r="1.2" fill="#7EACB5" stroke="none"/>
        <circle cx="-34" cy="0" r="1.2" fill="#7EACB5" stroke="none"/>
        <circle cx="34"  cy="0" r="1.2" fill="#7EACB5" stroke="none"/>
      </g>

      <!-- SMALL QUATREFOIL at tile corners -->
      <g stroke="#BF4646" stroke-width="0.85" fill="none">
        <g transform="translate(0,0)">
          <path d="M0,-8 C-3,-5 -5,-3 -8,0 C-5,3 -3,5 0,8 C3,5 5,3 8,0 C5,-3 3,-5 0,-8Z"/>
          <path d="M0,-5 C-2,-3 -3,-2 -5,0 C-3,2 -2,3 0,5 C2,3 3,2 5,0 C3,-2 2,-3 0,-5Z" stroke-width="0.6"/>
          <circle r="1.5" fill="#BF4646" stroke="none"/>
        </g>
        <g transform="translate(80,0)">
          <path d="M0,-8 C-3,-5 -5,-3 -8,0 C-5,3 -3,5 0,8 C3,5 5,3 8,0 C5,-3 3,-5 0,-8Z"/>
          <path d="M0,-5 C-2,-3 -3,-2 -5,0 C-3,2 -2,3 0,5 C2,3 3,2 5,0 C3,-2 2,-3 0,-5Z" stroke-width="0.6"/>
          <circle r="1.5" fill="#BF4646" stroke="none"/>
        </g>
        <g transform="translate(0,80)">
          <path d="M0,-8 C-3,-5 -5,-3 -8,0 C-5,3 -3,5 0,8 C3,5 5,3 8,0 C5,-3 3,-5 0,-8Z"/>
          <path d="M0,-5 C-2,-3 -3,-2 -5,0 C-3,2 -2,3 0,5 C2,3 3,2 5,0 C3,-2 2,-3 0,-5Z" stroke-width="0.6"/>
          <circle r="1.5" fill="#BF4646" stroke="none"/>
        </g>
        <g transform="translate(80,80)">
          <path d="M0,-8 C-3,-5 -5,-3 -8,0 C-5,3 -3,5 0,8 C3,5 5,3 8,0 C5,-3 3,-5 0,-8Z"/>
          <path d="M0,-5 C-2,-3 -3,-2 -5,0 C-3,2 -2,3 0,5 C2,3 3,2 5,0 C3,-2 2,-3 0,-5Z" stroke-width="0.6"/>
          <circle r="1.5" fill="#BF4646" stroke="none"/>
        </g>
      </g>

      <!-- Mid-edge dots -->
      <circle cx="40" cy="0"  r="1" fill="#7EACB5" opacity="0.6"/>
      <circle cx="40" cy="80" r="1" fill="#7EACB5" opacity="0.6"/>
      <circle cx="0"  cy="40" r="1" fill="#7EACB5" opacity="0.6"/>
      <circle cx="80" cy="40" r="1" fill="#7EACB5" opacity="0.6"/>

    </pattern>
    <radialGradient id="spotlight-grad" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="white" stop-opacity="1"/>
      <stop offset="65%"  stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="spotlight-mask">
      <circle id="spotlight-circle" cx="-999" cy="-999" r="160" fill="url(#spotlight-grad)"/>
    </mask>
  </defs>

  <rect id="batik-rect" width="100%" height="100%"
    fill="url(#batik)"
    mask="url(#spotlight-mask)"
    opacity="0.9"/>
</svg>